<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.x/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Página Inicial</title>

    <style>
         @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        
        body {font-family: roboto;}
        .ancor-nav:hover {
            background-color: rgb(79 70 229);
            color: white;
        }
    </style>
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <div class="offcanvas-md offcanvas-start border-end d-flex flex-column" id="sidebarMenu" style="height: 100vh;">
            <div class="offcanvas-header d-md-none">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
            </div>
            
            <a href="#" class="nav-link p-3 d-flex">
                <h1 style="font-family: Archivo Black; color: rgb(79 70 229);">Quest</h1>
                <h1>Log</h1>
            </a>
            <div class="p-3 text-center" style="height: auto;">
                <a href="/home.html" class="nav-link p-2 ancor-nav">Home</a>
                <a href="/index.html" class="nav-link p-2 ancor-nav">Questões</a>
                <a href="/manageQuest.html" class="nav-link p-2 ancor-nav">Gerenciar Questões</a>
                <a href="#" class="nav-link p-2 ancor-nav">Estatísticas</a>
            </div>
            <div class="p-3 m-3 mt-auto rounded text-light" id="dailyTarget" style="background-color: rgb(79 70 229)">
            </div>
    
            <a href="#" class="nav-link p-3 text-center ancor-nav">LogOut</a>
        </div>
        
        <div class="container p-0" style="background-color: #efefef;">
            <div class="p-2 ps-4 border-bottom shadow-sm bg-light d-flex align-items-center">
                <button class="btn btn-outline-primary d-md-none me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                    <i class="bi bi-list"></i>
                </button>
                <p class="mb-0 me-1">Bem Vindo <span id="welcomeName"></span></p>
            </div>
            
            <div class="row container">
                <div class="col p-2 rounded">
                    <div class="shadow rounded p-3" style="min-height: 100%;">Teste, testando</div>
                </div>
    
                <div class="col">
                    <div class="row p-2" style="min-height: 50%;">
                        <div class="shadow rounded p-3" style="min-height: 100%;">Teste, testando 2</div>
                    </div>
    
                    <div class="row p-2 rounded" style="min-height: 50%;">
                        <div class="shadow rounded p-3" style="min-height: 100%;">Teste, testando 3</div>
                    </div>
                </div>
                <div class="p-2 rounded">
                    <div class="shadow rounded p-3" style="min-height: 100%;">Teste, testando 4</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const text = document.querySelector('#text');
        const btn = document.querySelector('#btn');
        const msg = document.querySelector('#msg');
        const welcomeName = document.querySelector('#welcomeName');

        fetch('/api/server', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({op: 'home', id: 1})
        })
            .then(response => response.json())
            .then(res => {
                welcomeName.innerText = res.name + ' ' + res.lastName
            })
    </script>
</body>
</html>
