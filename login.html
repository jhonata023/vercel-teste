<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Faça Login</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        
        body {
            font-family: roboto;
        }
    </style>
</head>
<body>
    <div class="d-flex align-items-center justify-content-center" 
    style="height: 100vh; background-image: url('backgroundLogin.jpeg'); background-size: contain;">

        <div class="d-flex flex-column rounded bg-light shadow p-5" id="divLogin" style="min-width: 35vw;">
            <h3 class="mb-5 text-center" style="max-height: 100vh; font-family: Archivo Black;"><span style="color: rgb(79 70 229);">Faça</span> Login</h3>
            
            <div class="bg-danger rounded p-2 mb-2 d-none" id="errorLogin"></div>

            <label for="email" class="ms-3">Email</label>
            <input type="text" name="email" id="loginEmail" class="mb-2 form-control">

            <label for="password" class="ms-3">Senha</label>
            <input type="password" name="password" id="loginPassword" class="mb-5 form-control">

            <button class="btn btn-primary mb-3" id="loginBtn">Entrar</button>

            <a href="#" class="text-center" id="registerLink">Fazer cadastro</a>
        </div>

        <div class="d-flex flex-column rounded bg-light shadow p-5 d-none" id="divRegister" style="min-width: 35vw;">
            <h3 class="mb-5 text-center" style="font-family: Archivo Black;"><span style="color: rgb(79 70 229);">Registre</span>-se</h3>

            <div class="bg-danger rounded p-2 mb-2 d-none" id="errorRegister"></div>

            <label for="email" class="ms-3">Email</label>
            <input type="text" name="email" id="email" class="mb-2 form-control">

            <label for="name" class="ms-3">Nome</label>
            <input type="text" name="name" id="name" class="mb-2 form-control">

            <label for="lastName" class="ms-3">Sobrenome</label>
            <input type="text" name="lastName" id="lastName" class="mb-2 form-control">

            <label for="password" class="ms-3">Senha</label>
            <input type="password" name="password" id="password" class="mb-2 form-control">

            <label for="passwordConfirm" class="ms-3">Confirme a Senha</label>
            <input type="password" name="passwordConfirm" id="passwordConfirm" class="mb-5 form-control">

            <button class="btn btn-primary mb-3" id="registerBtn">Registrar</button>

            <a href="#" class="text-center" id="loginLink">Fazer Login</a>
        </div> 
    </div>
    <script>
        const divLogin = document.querySelector('#divLogin');
        const loginLink = document.querySelector('#loginLink');
        const loginEmail = document.querySelector('#loginEmail');
        const loginPassword = document.querySelector('#loginPassword');
        const loginBtn = document.querySelector('#loginBtn');
        const errorLogin = document.querySelector('#errorLogin');

        const registerLink = document.querySelector('#registerLink');
        const divRegister = document.querySelector('#divRegister');
        const registerEmail = document.querySelector('#email');
        const registerName = document.querySelector('#name');
        const registerLastName = document.querySelector('#lastName');
        const password = document.querySelector('#password');
        const passwordConfirm = document.querySelector('#passwordConfirm');
        const registerBtn = document.querySelector('#registerBtn');
        const errorRegister = document.querySelector('#errorRegister');

        loginLink.addEventListener('click', () => {
            divLogin.classList.remove('d-none');
            divRegister.classList.add('d-none');
        })
        registerLink.addEventListener('click', () => {
            divLogin.classList.add('d-none');
            divRegister.classList.remove('d-none');
        })

        registerBtn.addEventListener('click', () => {
            if (password.value === passwordConfirm.value) {
                let newUser = {
                    email: registerEmail.value,
                    name: registerName.value,
                    lastName: registerLastName.value,
                    password: password.value
                };

                console.log('Usuário cadastrado com sucesso');
                console.log(newUser);
            } else {
                console.log('As senhas não correspondem');
                errorRegister.classList.remove('d-none');
                errorRegister.innerText = 'As senhas não correspondem';
            }
        })
        loginBtn.addEventListener('click', () => {
            let user = {
                email: loginEmail.value,
                password: loginPassword.value
            };

            console.log('Login Realizado com sucesso');
            console.log(user);
        })
    </script>
</body>
</html>
