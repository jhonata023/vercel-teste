<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.x/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Gerenciar Questões</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        
        body {font-family: roboto;}
        .ancor-nav:hover {
            background-color: rgb(79 70 229);
            color: white;
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="offcanvas-md offcanvas-start border-end d-flex flex-column" id="sidebarMenu" style="height: 100vh;">
            <div class="offcanvas-header d-md-none">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
            </div>
            
            <a href="#" class="nav-link p-3 d-flex">
                <h1 style="font-family: Archivo Black; color: rgb(79 70 229);">Quest</h1>
                <h1>Log</h1>
            </a>
            <div class="p-3 text-center" style="height: auto;">
                <a href="/home.html" class="nav-link p-2 ancor-nav">Home</a>
                <a href="/index.html" class="nav-link p-2 ancor-nav">Questões</a>
                <a href="/manageQuest.html" class="nav-link p-2 ancor-nav">Gerenciar Questões</a>
                <a href="#" class="nav-link p-2 ancor-nav">Estatísticas</a>
            </div>
            <div class="p-3 m-3 mt-auto rounded text-light" id="dailyTarget" style="background-color: rgb(79 70 229)">
            </div>
    
            <a href="#" class="nav-link p-3 text-center ancor-nav">LogOut</a>
        </div>

        <div class="" style="background-color: #efefef;">
            <div class="p-2 ps-4 border-bottom shadow-sm bg-light d-flex align-items-center">
                <button class="btn btn-outline-primary d-md-none me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                    <i class="bi bi-list"></i>
                </button>
                <p class="mb-0 me-1">Cadastrar Nova Questão</p>
            </div>
            
            <div id="divMsg"></div>
    
            <form action="" class="p-4" id="formNewQuestion">
                <fieldset class="row border rounded shadow mt-3 p-2 bg-light">
                    <legend style="color: rgb(79 70 229);">Informações da prova</legend>
    
                    <div class="col-md-4 col-sm-6">
                        <label for="banca" class="form-label">Banca</label>
                        <input type="text" name="banca" class="form-control">
                    </div>
                    
                    <div class="col-md-4 col-sm-6">
                        <label for="cargo" class="form-label">Cargo</label>
                        <input type="text" name="cargo" class="form-control">
                    </div>
                    
                    <div class="col-md-4 col-sm-6">
                        <label for="orgao" class="form-label">Órgão</label>
                        <input type="text" name="orgao" class="form-control">
                    </div>
    
                    <div class="col-6">
                        <label for="ano" class="form-label">Ano</label>
                        <input type="text" name="ano" class="form-control">
                    </div>
                    
                    <div class="col-6">
                        <label for="nivel" class="form-label">Nível</label>
                        <input type="text" name="nivel" class="form-control">
                    </div>
                </fieldset>
                <fieldset class="row border rounded shadow mt-3 p-2 bg-light">
                    <legend style="color: rgb(79 70 229);">Classificação do conteúdo</legend>
    
                    <div class="col-6">
                        <label for="materia" class="form-label">Matéria</label>
                        <input type="text" name="materia" class="form-control">
                    </div>
                    
                    <div class="col-6">
                        <label for="submateria" class="form-label">Submatéria</label>
                        <input type="text" name="submateria" class="form-control">
                    </div>
                </fieldset>
                <fieldset class="row border rounded shadow mt-3 p-2 bg-light">
                    <legend style="color: rgb(79 70 229);">Corpo da questão</legend>
    
                    <div class="col-12">
                        <label for="enunciado" class="form-label">Enunciado</label>
                        <textarea name="enunciado" class="form-control"></textarea>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="alternativaA" class="form-label">Alternativa A</label>
                        <input type="text" name="alternativaA" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="alternativaB" class="form-label">Alternativa B</label>
                        <input type="text" name="alternativaB" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="alternativaC" class="form-label">Alternativa C</label>
                        <input type="text" name="alternativaC" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="alternativaD" class="form-label">Alternativa D</label>
                        <input type="text" name="alternativaD" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="alternativaE" class="form-label">Alternativa E</label>
                        <input type="text" name="alternativaE" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label for="correct" class="form-label">Alternativa Correta</label>
                        <input type="text" name="correct" class="form-control">
                    </div>
    
                    <div class="col-12">
                        <label for="explicacao" class="form-label">Explicação</label>
                        <!-- <input type="text" name="explicacao" class="form-control"> -->
                         <textarea name="explicacao" class="form-control"></textarea>
                    </div>
                </fieldset>
    
                <button class="btn btn-primary container mt-3" id="sendForm">Cadastrar</button>
            </form>
        </div>
    </div>

    <script>
        const formNewQuestion = document.querySelector('#formNewQuestion');
        const sendBtn = document.querySelector('#sendForm');

        sendBtn.addEventListener('click', () => {
            event.preventDefault();
            const formData = new FormData(formNewQuestion);
            const dados = Object.fromEntries(formData.entries());
            dados.op = 'newQuestion';

            fetch('/api/server', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(dados)
            })
                .then(response => response.json())
                .then(res => {
                    alert(res.msg);
                    meuFormulario.reset();
                });
        })
    </script>
</body>
</html>
