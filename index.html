<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.x/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        
        body {font-family: roboto;}
        .alternativa {
            background-color: #6C757D;
        }
        .resposta {
            cursor: pointer;
        }
        .resposta:hover {
            background-color: #6C757D;
            color: white;
        }
        .resposta:hover > .alternativa {
            background-color: rgb(202, 202, 202);
            color: black !important;
        }
        .resposta input:checked + .alternativa {
            background-color: rgb(202, 202, 202);
            color: black !important;
        }
        .resposta:has(input:checked) {
            background-color: #6C757D;
            color: white;
        }
        .ancor-nav:hover {
            background-color: rgb(79 70 229);
            color: white;
        }
    </style>

    <title>Questões</title>
</head>
<body>
    <div class="d-flex">
        <div class="offcanvas-md offcanvas-start border-end d-flex flex-column" id="sidebarMenu" style="height: 100vh; min-width: 16rem; max-width: 16rem;">
            <div class="offcanvas-header d-md-none">
                <!-- <h5 class="offcanvas-title">Menu</h5> -->
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
            </div>
            
            <a href="#" class="nav-link p-3 d-flex">
                <h1 style="font-family: Archivo Black; color: rgb(79 70 229);">Quest</h1>
                <h1>Log</h1>
            </a>
            <div class="p-3 text-center" style="height: auto;">
                <a href="/home.html" class="nav-link p-2 ancor-nav">Home</a>
                <a href="#" class="nav-link p-2 ancor-nav">Questões</a>
                <a href="/manageQuest.html" class="nav-link p-2 ancor-nav">Gerenciar Questões</a>
                <a href="#" class="nav-link p-2 ancor-nav">Estatísticas</a>
                <a href="#" class="nav-link p-2 ancor-nav" data-bs-toggle="collapse" data-bs-target="#filtersList"
                    aria-expanded="false" aria-controls="filtersList">Filtros</a>
            </div>
            <div class="ps-3 pe-3 pb-3 collapse" id="filtersList">
                <form action="" class="border rounded p-2" style="background-color: #efefef;">
                    <select class="form-select-sm col-12 m-1" name="materia" id="filterMateria">
                        <option value="">Matéria</option>
                        <option value="Direito Constitucional">Direito Constitucional</option>
                        <option value="Português">Português</option>
                    </select>
                    <select class="form-select-sm col-12 m-1" name="Assunto" id="filterAssunto">
                        <option value="">Assunto</option>
                        <option value="Artigo 5º">Artigo 5º</option>
                        <option value="Direitos e Garantias Fundamentais">Direitos e Garantias Fundamentais</option>
                    </select>
                    <select class="form-select-sm col-5 m-1" name="Banca" id="filterBanca">
                        <option value="">Banca</option>
                        <option value="CESPE/CEBRASPE">CESPE/CEBRASPE</option>
                        <option value="CRS">CRS</option>
                    </select>
                    <select class="form-select-sm col-5 m-1" name="Orgao" id="filterOrgao">
                        <option value="">Órgão</option>
                        <option value="PF">PF</option>
                        <option value="PMMG">PMMG</option>
                    </select>
                    <select class="form-select-sm col-5 m-1" name="Cargo" id="filterCargo">
                        <option value="">Cargo</option>
                        <option value="Agente">Agente</option>
                        <option value="Soldado">Soldado</option>
                    </select>
                    <select class="form-select-sm col-5 m-1" name="Ano" id="filterAno">
                        <option value="">Ano</option>
                        <option value="2025º">2025</option>
                        <option value="2022">2022</option>
                    </select>

                    <input type="submit" class="btn btn-primary col-12">
                </form>
            </div>
            <div class="p-3 m-3 mt-auto rounded text-light" id="dailyTarget" style="background-color: rgb(79 70 229)">
                <!-- <p class="mb-0">Meta diária</p>
                <p><b>16/50 Questões</b></p>
                <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="75" 
                    aria-valuemin="0" aria-valuemax="100"  style="height: 10px; background-color: rgb(129, 124, 228);">
                    <div class="progress-bar bg-light" style="width: 32%;"></div>
                </div> -->
            </div>
    
            <a href="#" class="nav-link p-3 text-center ancor-nav">LogOut</a>
        </div>
        <div class="container p-0" style="background-color: #efefef; width: 100%;">
            <div class="p-2 ps-4 border-bottom shadow-sm bg-light d-flex align-items-center">
                <button class="btn btn-outline-primary d-md-none me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                    <i class="bi bi-list"></i>
                </button>
                <p class="mb-0 me-1">Direito Constitucional</p>
                <p class="mb-0 me-1">-</p>
                <p class="mb-0 me-1">Artigo 5º</p>
            </div>
            <div class="ps-md-5 pt-md-5 pe-md-5">
                <div class="bg-light border rounded shadow p-4">
                    <div class="d-flex justify-content-between mb-4 p-2" style="width: 100%;">
                        <div class="rounded bg-warning ps-2 pe-2" style="height: 30px;">
                            <p id="nivel" class="mb-1">Médio</p>
                            <div style="font-size: 12px;">Questão: <span id="code">1</span></div>
                        </div>
                        <div>
                            <p class="m-0"><b>Banca: <span id="banca">CESBRASPE </span> <span id="ano">(2025)</span></b></p>
                            <div class="d-flex justify-content-between" style="width: 100%;">
                                <p class="m-0 me-1">Órgão: <span id="orgao">PF</span></p>
                                |
                                <p class="m-0 ms-1">Cargo: <span id="cargo">Agente</span></p>
                            </div>
                        </div>
                    </div>

                    <div id="res-msg" class="p-2 rounded"></div>
        
                    <div class="p-3" id="enunciado">
                        <!-- <p>
                            No que se refere aos direitos e garantias fundamentais previstos na Constituição 
                            Federal de 1988, julgue o item a seguir:
                        </p>
                        <p>
                            "É plena a liberdade de associação para fins lícitos, inclusive a de caráter 
                            paramilitar, desde que haja prévia autorização estatal."
                        </p> -->
                    </div>
        
                    <div class="d-flex flex-column text-start" id="alternativas">
                        <!-- <label class="resposta border rounded p-2 d-flex mb-3" style="width: 100%;">
                            <input type="radio" name="resposta" value="C" hidden>
                            <div class="alternativa border rounded p-1 ps-2 pe-2 text-light"><b>C</b></div>
                            <p class="mb-0 p-1 ps-3" style="width: auto;">Certo</p>
                        </label>
                        <label class="resposta border rounded p-2 d-flex mb-3" style="width: 100%;">
                            <input type="radio" name="resposta" value="E" hidden>
                            <div class="alternativa border rounded p-1 ps-2 pe-2 text-light"><b>E</b></div>
                            <p class="mb-0 p-1 ps-3" style="width: auto;">Errado</p>
                        </label> -->
                    </div>
        
                    <div class="mt-3 d-flex justify-content-around" style="width: 100%;">
                        <button class="btn btn-primary" id="resolveQuest">Responder</button>
                        <div>
                            <!-- <button class="btn btn-outline-secondary" id="previusQuest"><</button> -->
                            <button class="btn btn-outline-secondary" id="nextQuest">></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const enunciado = document.querySelector('#enunciado');
        const nivel = document.querySelector('#nivel');
        const banca = document.querySelector('#banca');
        const ano = document.querySelector('#ano');
        const orgao = document.querySelector('#orgao');
        const cargo = document.querySelector('#cargo');
        const code = document.querySelector('#code');
        const divAlternativas = document.querySelector('#alternativas');

        const dailyTarget = document.querySelector('#dailyTarget');

        const previusQuest = document.querySelector('#previusQuest');
        const nextQuest = document.querySelector('#nextQuest');
        const resolveQuest = document.querySelector('#resolveQuest');

        const renderQuestion = questions => {
            nivel.innerText = questions[0].nivel;
            enunciado.innerText = questions[0].enunciado;
            banca.innerText = questions[0].banca;
            ano.innerText = '(' + questions[0].ano + ')';
            orgao.innerText = questions[0].orgao;
            cargo.innerText = questions[0].cargo;
            code.innerText = questions[0].id;

            divAlternativas.innerHTML = '';
            if (questions[0].alternativas.length > 2) {
                for (let i = 0; i < questions[0].alternativas.length; i++) {
                    const letras = ['A', 'B', 'C', 'D', 'E'];
                    const letraAtual = letras[i]
                    divAlternativas.innerHTML += `
                    <label class="resposta border rounded p-2 d-flex mb-3" style="width: 100%;">
                        <input type="radio" name="resposta" value="${letraAtual}" hidden>
                        <div class="alternativa border rounded p-1 ps-2 pe-2 text-light"><b>${letraAtual}</b></div>
                        <p class="mb-0 p-1 ps-3" style="width: auto;">${questions[0].alternativas[i]}</p>
                    </label>`
                }
            }
            else {
                for (let i = 0; i < questions[0].alternativas.length; i++) {
                    divAlternativas.innerHTML += `
                    <label class="resposta border rounded p-2 d-flex mb-3" style="width: 100%;">
                        <input type="radio" name="resposta" value="${questions[0].alternativas[i][0]}" hidden>
                        <div class="alternativa border rounded p-1 ps-2 pe-2 text-light"><b>${questions[0].alternativas[i][0]}</b></div>
                        <p class="mb-0 p-1 ps-3" style="width: auto;">${questions[0].alternativas[i]}</p>
                    </label>`
                }
            }
        }
        const renderProgress = progress => {
            const base = 100 / progress.dailyTarget;

            dailyTarget.innerHTML = `
            <p class="mb-0">Meta diária</p>
            <p><b>${progress.actualQuests}/${progress.dailyTarget} Questões</b></p>
            <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="75" 
                aria-valuemin="0" aria-valuemax="100"  style="height: 10px; background-color: rgb(129, 124, 228);">
                <div class="progress-bar bg-light" style="width: ${base*progress.actualQuests}%;"></div>
            </div>`
        }

        resolveQuest.addEventListener('click', () => {
            fetch('/api/server', {
                method: 'POST',
                headers: {'Content-Type' : 'application/json'},
                body: JSON.stringify({
                    op: 'resolveQuest',
                    userAnswer : document.querySelector('input[name="resposta"]:checked').value,
                    idQuest: code.innerText
                })
            })
                .then(response => response.json())
                .then(res => {
                    const resMsg = document.querySelector('#res-msg');
                    resMsg.innerText = res.msg;

                    if (res.valid) resMsg.style.backgroundColor = 'rgba(59, 174, 59, 0.596)';
                    else {
                        resMsg.style.backgroundColor = 'rgba(255, 0, 0, 0.4)';
                        
                        for (let i = 0; i < divAlternativas.children.length; i++) {
                            const element = divAlternativas.children[i];
                            if(res.correct == element.children[0].value) element.style.backgroundColor = 'rgba(59, 174, 59, 0.596)';
                            if(res.userAnswer == element.children[0].value) element.style.backgroundColor = 'rgba(255, 0, 0, 0.4)';
                        }
                    }
                })
            });
        nextQuest.addEventListener('click', () => {
            fetch('/api/server', {
                method: 'POST',
                headers: {'Content-Type' : 'application/json'},
                body: JSON.stringify({op: 'nextQuest',idQuest: code.innerText, idUser: 1})
            })
            .then(response => response.json())
            .then(res => renderQuestion([res.nextQuestion]))
        });
        // previusQuest.addEventListener('click', () => {
        //     fetch('/api/server', {
        //         method: 'POST',
        //         headers: {'Content-Type' : 'application/json'},
        //         body: JSON.stringify()
        //     })
        // });

        fetch('/api/server', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({op: 'renderQuestion'})
        })
            .then(response => response.json())
            .then(res => {
                renderQuestion(res.questions);
                renderProgress(res.progressUser[0])
            })
    </script>
</body>
</html>
